name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

  rust:
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: cargo
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: cross
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build: cross
          - os: macos-14
            target: x86_64-apple-darwin
            build: cargo
          - os: macos-14
            target: aarch64-apple-darwin
            build: cargo
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            build: cargo
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.build == 'cross'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.build }}" == "cross" ]]; then
            cross build --release --locked --target "${{ matrix.target }}" --bin seriate
          else
            cargo build --release --locked --target "${{ matrix.target }}" --bin seriate
          fi

      - name: Package archive
        if: runner.os != 'Windows'
        id: package_unix
        shell: bash
        run: |
          asset="seriate-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$asset" seriate
          shasum -a 256 "$asset" > "$asset.sha256"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ steps.package_unix.outputs.asset }}
            ${{ steps.package_unix.outputs.asset }}.sha256
          fail_on_unmatched_files: true

      - name: Package archive
        if: runner.os == 'Windows'
        id: package_windows
        shell: pwsh
        run: |
          $asset = "seriate-$env:GITHUB_REF_NAME-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/seriate.exe" -DestinationPath $asset -Force
          $hash = (Get-FileHash -Algorithm SHA256 $asset).Hash.ToLower()
          "$hash  $(Split-Path $asset -Leaf)" | Out-File -FilePath "$asset.sha256" -Encoding ascii
          "asset=$asset" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload release assets
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ steps.package_windows.outputs.asset }}
            ${{ steps.package_windows.outputs.asset }}.sha256
          fail_on_unmatched_files: true

  publish-crates:
    name: Publish to crates.io
    needs: rust
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ !contains(github.ref, '-') }} # skip pre-releases
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
